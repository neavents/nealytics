services:
  clickhouse-test:
    image: clickhouse/clickhouse-server:latest
    container_name: nealytics-clickhouse-test
    ports:
      - "9000:9000"
      - "8123:8123"
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
    volumes:
      - ./clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 2s
      timeout: 5s
      retries: 30
