name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: nealytics-engine-linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
            artifact: nealytics-engine-linux-arm64
          - os: macos-latest
            rid: osx-arm64
            artifact: nealytics-engine-osx-arm64
          - os: windows-latest
            rid: win-x64
            artifact: nealytics-engine-win-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Native AOT
        run: >
          dotnet publish src/Nealytics.Engine/Nealytics.Engine.csproj
          -c Release
          -r ${{ matrix.rid }}
          -o publish/

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cd publish
          chmod +x Nealytics.Engine
          tar -czf ../${{ matrix.artifact }}.tar.gz Nealytics.Engine

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path publish/Nealytics.Engine.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
